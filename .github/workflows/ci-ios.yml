name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-ios-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ios-architecture:
    name: ios-architecture
    runs-on: macos-26
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Select and validate Xcode 26.5 toolchain
        shell: bash
        run: |
          set -euo pipefail
          readonly xcode_app=/Applications/Xcode_26.5.app
          [[ -d "$xcode_app/Contents/Developer" ]] || { printf '%s\n' "error: required Xcode is absent: $xcode_app" >&2; exit 1; }
          [[ "$DEVELOPER_DIR" == "$xcode_app/Contents/Developer" ]] || { printf '%s\n' "error: DEVELOPER_DIR is not set to Xcode 26.5" >&2; exit 1; }
          xcode_version="$(xcodebuild -version)"
          [[ "$xcode_version" == $'Xcode 26.5\nBuild version '* ]] || { printf '%s\n' "error: expected Xcode 26.5, found: $xcode_version" >&2; exit 1; }
          swift_version="$(xcrun swift --version)"
          [[ "$swift_version" == *"Swift version 6.3.2 "* ]] || { printf '%s\n' "error: expected Swift 6.3.2, found: $swift_version" >&2; exit 1; }
      - name: Run architecture evidence profile
        run: Scripts/ci/run-evidence-profile.sh --profiles Docs/evidence/evidence-profiles.yml --id ARCH-001
      - name: Upload architecture evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-architecture-evidence-${{ github.sha }}
          path: Evidence/tests/ARCH-001.json*
          if-no-files-found: error
          retention-days: 90


