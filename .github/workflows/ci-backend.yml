          if not isinstance(status, dict):
              raise SystemExit(1)
          values = {
              value
              for key in ("DB_URL", "DB URL", "db_url", "database_url", "databaseUrl")
              if isinstance((value := status.get(key)), str) and value
          }
          if len(values) != 1:
              raise SystemExit(1)
          database_url = values.pop()
          parsed = urlsplit(database_url)
          if (
              parsed.scheme not in {"postgres", "postgresql"}
