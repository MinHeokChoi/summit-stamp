                  "iss": os.environ["M2A_ASC_ISSUER_ID"],
                  "aud": "appstoreconnect-v1",
                  "exp": int(time.time()) + 600,
              }))
              signed = header + b"." + payload
              key = Path.home() / ".appstoreconnect" / "private_keys" / f"AuthKey_{os.environ['M2A_ASC_KEY_ID']}.p8"
              result = subprocess.run(["openssl", "dgst", "-sha256", "-sign", str(key)], input=signed, check=False, capture_output=True)
