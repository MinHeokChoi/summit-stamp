          response_path = Path("Evidence/runtime/live/M2A-ASC-response.json")
          descriptor = os.open(response_path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(descriptor, "wb") as output:
              output.write(canonical(response_document) + b"\n")
          upload_raw = Path(os.environ["RUNNER_TEMP"], "m2a-altool-upload.json").read_bytes()
          if not upload_raw:
