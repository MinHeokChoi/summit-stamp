              request = urllib.request.Request(request_url, headers={"Accept": "application/json", "Authorization": f"Bearer {jwt()}"})
              with urllib.request.urlopen(request, timeout=20) as response:
                  if response.status != 200 or response.geturl() != request_url:
                      raise SystemExit("App Store Connect build query failed")
                  body = json.loads(response.read(512 * 1024 + 1).decode("utf-8", "strict"))
              values = body.get("data") if isinstance(body, dict) else None
              if isinstance(values, list) and len(values) == 1 and isinstance(values[0], dict):
                  candidate = values[0]
                  attributes = candidate.get("attributes")
                  if (
                      candidate.get("type") == "build"
                      and isinstance(candidate.get("id"), str)
                      and candidate["id"].isdigit()
                      and isinstance(attributes, dict)
                      and attributes.get("version") == version
                      and isinstance(attributes.get("uploadedDate"), str)
                  ):
                      selected = candidate
                      break
              time.sleep(15)
          if selected is None:
              raise SystemExit("uploaded TestFlight build was not observed through App Store Connect")
          uploaded = selected["attributes"]["uploadedDate"]
          observed = datetime.fromisoformat(uploaded.replace("Z", "+00:00")).astimezone(timezone.utc).replace(microsecond=0).strftime("%Y-%m-%dT%H:%M:%SZ")
          response_document = {
              "schemaVersion": 1,
              "artifactType": "app-store-connect-build-response",
              "apiEndpoint": endpoint,
              "statusCode": 200,
              "appStoreBuildId": selected["id"],
              "appStoreBuildVersion": version,
              "uploadedDate": observed,
              "querySHA256": sha256(query),
