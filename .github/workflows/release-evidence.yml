      - name: Read signed immutable Supabase checkpoint receipt
        shell: bash
        env:
          M2A_BUILD_DIGEST: ${{ steps.archive.outputs.build_digest }}
          M2A_TESTFLIGHT_DIGEST: ${{ steps.archive.outputs.testflight_digest }}
          M2A_CHECKPOINT_RECEIPT_URL: ${{ vars.M2A_CHECKPOINT_RECEIPT_URL }}
          M2A_CHECKPOINT_RECEIPT_PUBLIC_KEY_BASE64: ${{ vars.M2A_CHECKPOINT_RECEIPT_PUBLIC_KEY_BASE64 }}
          M2A_CHECKPOINT_RECEIPT_TOKEN: ${{ secrets.M2A_CHECKPOINT_RECEIPT_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import re
          import subprocess
          import tempfile
          import time
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          SHA256 = re.compile(r"^[a-f0-9]{64}$")
          UUID = re.compile(r"^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$")
          CODE = re.compile(r"^[A-Z][A-Z0-9_]{0,63}$")

          def canonical(value):
              return json.dumps(value, sort_keys=True, separators=(",", ":"), ensure_ascii=True).encode("ascii")

          def sha256(value):
              return hashlib.sha256(value if isinstance(value, bytes) else canonical(value)).hexdigest()

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, request, fp, code, message, headers, newurl):
                  return None

          def publish(path, commit_path, document):
              raw = canonical(document) + b"\n"
              sidecar_path = Path(f"{path}.sha256")
              sidecar = f"{hashlib.sha256(raw).hexdigest()}  {path.as_posix()}\n".encode("ascii")
              commit = canonical({
                  "schemaVersion": 1,
                  "artifactType": "evidence-publication-commit",
                  "evidencePath": path.as_posix(),
                  "evidenceSHA256": hashlib.sha256(raw).hexdigest(),
                  "sidecarPath": sidecar_path.as_posix(),
                  "sidecarSHA256": hashlib.sha256(sidecar).hexdigest(),
              }) + b"\n"
              for destination, content in ((path, raw), (sidecar_path, sidecar), (commit_path, commit)):
                  descriptor = os.open(destination, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
                  with os.fdopen(descriptor, "wb") as output:
                      output.write(content)
                      output.flush()
                      os.fsync(output.fileno())

          endpoint = os.environ.get("M2A_CHECKPOINT_RECEIPT_URL", "")
          token = os.environ.get("M2A_CHECKPOINT_RECEIPT_TOKEN", "")
          encoded_key = os.environ.get("M2A_CHECKPOINT_RECEIPT_PUBLIC_KEY_BASE64", "")
          parsed = urllib.parse.urlparse(endpoint)
          if parsed.scheme != "https" or not parsed.netloc or parsed.query or parsed.fragment or not token or not re.fullmatch(r"[A-Za-z0-9+/]+={0,2}", encoded_key):
              raise SystemExit("protected checkpoint receipt configuration is unavailable")
          try:
              public_key = base64.b64decode(encoded_key, validate=True)
          except ValueError as error:
              raise SystemExit("checkpoint receipt public key is malformed") from error
          if b"BEGIN PUBLIC KEY" not in public_key:
              raise SystemExit("checkpoint receipt public key is malformed")
          query = {
              "githubRunId": os.environ["GITHUB_RUN_ID"],
              "gitSHA": os.environ["GITHUB_SHA"],
              "buildDigest": os.environ["M2A_BUILD_DIGEST"],
              "testFlightBuildDigest": os.environ["M2A_TESTFLIGHT_DIGEST"],
          }
          response_url = endpoint + "?" + urllib.parse.urlencode(query)
          opener = urllib.request.build_opener(NoRedirect)
          raw = signature = None
          for _ in range(30):
              request = urllib.request.Request(response_url, headers={"Accept": "application/json", "Authorization": f"Bearer {token}"})
              try:
                  with opener.open(request, timeout=20) as response:
                      if response.status != 200 or response.geturl() != response_url:
                          raise SystemExit("checkpoint receipt query failed")
                      candidate = response.read(64 * 1024 + 1)
                      signature_header = response.headers.get("X-M2A-Receipt-Signature")
                      algorithm = response.headers.get("X-M2A-Receipt-Signature-Algorithm")
              except Exception:
                  time.sleep(10)
                  continue
              if len(candidate) > 64 * 1024 or not signature_header or algorithm != "ed25519":
                  time.sleep(10)
                  continue
              try:
                  candidate_signature = base64.b64decode(signature_header, validate=True)
              except ValueError:
                  time.sleep(10)
                  continue
              with tempfile.TemporaryDirectory(prefix="m2a-receipt-") as directory:
                  key_path = Path(directory, "key.pem")
                  body_path = Path(directory, "body.json")
                  signature_path = Path(directory, "body.sig")
                  key_path.write_bytes(public_key)
                  body_path.write_bytes(candidate)
                  signature_path.write_bytes(candidate_signature)
                  verified = subprocess.run(
                      ["openssl", "pkeyutl", "-verify", "-pubin", "-inkey", str(key_path), "-rawin", "-in", str(body_path), "-sigfile", str(signature_path)],
                      check=False,
                      capture_output=True,
                  )
              if verified.returncode == 0:
                  raw, signature = candidate, candidate_signature
                  break
              time.sleep(10)
          if raw is None or signature is None:
              raise SystemExit("signed immutable checkpoint receipt was not observed")
          try:
              def reject_duplicate_object(pairs):
                  value = {}
                  for key, item in pairs:
                      if key in value:
                          raise ValueError("duplicate key")
                      value[key] = item
                  return value

              response = json.loads(raw.decode("utf-8", "strict"), object_pairs_hook=reject_duplicate_object)
          except (UnicodeDecodeError, json.JSONDecodeError, ValueError):
              raise SystemExit("checkpoint receipt is not JSON")
          fields = {
              "schemaVersion", "receiptId", "transactionId", "githubRunId", "gitSHA", "buildDigest", "testFlightBuildDigest",
              "actorCorrelationSHA256", "nonceSHA256", "stateSHA256", "callbackSHA256",
              "issuerValidated", "issuerCode", "audienceValidated", "audienceCode", "providerValidated", "providerCode",
              "callbackValidated", "callbackCode", "supabaseSessionIssued", "sessionCode",
              "completedAt", "receiptSHA256",
          }
          if (
              not isinstance(response, dict)
              or set(response) != fields
              or response.get("schemaVersion") != 1
              or response.get("githubRunId") != query["githubRunId"]
              or response.get("gitSHA") != query["gitSHA"]
              or response.get("buildDigest") != query["buildDigest"]
              or response.get("testFlightBuildDigest") != query["testFlightBuildDigest"]
              or any(not isinstance(response.get(field), str) or UUID.fullmatch(response[field]) is None for field in ("receiptId", "transactionId"))
              or any(not isinstance(response.get(field), str) or SHA256.fullmatch(response[field]) is None for field in ("actorCorrelationSHA256", "nonceSHA256", "stateSHA256", "callbackSHA256", "receiptSHA256"))
              or any(response.get(field) is not True for field in ("issuerValidated", "audienceValidated", "providerValidated", "callbackValidated", "supabaseSessionIssued"))
              or any(not isinstance(response.get(field), str) or CODE.fullmatch(response[field]) is None for field in ("issuerCode", "audienceCode", "providerCode", "callbackCode", "sessionCode"))
          ):
              raise SystemExit("checkpoint receipt does not match immutable run correlation")
          response_path = Path("Evidence/runtime/live/M2A-checkpoint-response.json")
          signature_path = Path("Evidence/runtime/live/M2A-checkpoint-response.sig")
          for destination, content in ((response_path, raw), (signature_path, signature)):
              descriptor = os.open(destination, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
              with os.fdopen(descriptor, "wb") as output:
                  output.write(content)
          source = dict(response)
          source.update({
              "artifactType": "m2a-immutable-checkpoint-observation",
              "receiptResponseSHA256": sha256(raw),
              "responseSignatureSHA256": sha256(signature),
              "signatureAlgorithm": "ed25519",
              "observedAt": datetime.now(timezone.utc).replace(microsecond=0).strftime("%Y-%m-%dT%H:%M:%SZ"),
          })
          publish(
              Path("Evidence/runtime/AUTH-APPLE-STAGING-source.json"),
              Path("Evidence/runtime/AUTH-APPLE-STAGING-source.commit"),
              source,
          )
          PY
      - name: Collect current M2A role approvals
