              values = []
              for _ in range(2):
                  if offset >= len(der) or der[offset] != 0x02:
                      raise ValueError("invalid DER signature")
                  offset += 1
                  width = der[offset]
                  offset += 1
                  if width & 0x80:
                      count = width & 0x7f
                      if count == 0 or count > 2:
                          raise ValueError("invalid DER signature")
                      width = int.from_bytes(der[offset:offset + count], "big")
                      offset += count
                  value = der[offset:offset + width]
                  offset += width
                  if not value:
                      raise ValueError("invalid DER signature")
                  values.append(int.from_bytes(value, "big").to_bytes(32, "big"))
              if offset != len(der):
                  raise ValueError("invalid DER signature")
              return b"".join(values)

          def jwt():
