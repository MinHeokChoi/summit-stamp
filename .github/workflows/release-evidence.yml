                  "schemaVersion": 2,
                  "artifactType": "app-store-connect-testflight-observation",
                  "githubRunId": os.environ["GITHUB_RUN_ID"],
                  "gitSHA": os.environ["GITHUB_SHA"],
                  "buildDigest": os.environ["M2A_BUILD_DIGEST"],
                  "testFlightDigest": os.environ["M2A_TESTFLIGHT_DIGEST"],
                  "ipaPath": "Evidence/runtime/live/M2A-release.ipa",
                  "appStoreBuildId": selected["id"],
                  "appStoreBuildVersion": version,
                  "apiEndpoint": endpoint,
                  "apiResponseSHA256": sha256(response_document),
                  "uploadResponseSHA256": sha256(upload_raw),
                  "observedAt": datetime.now(timezone.utc).replace(microsecond=0).strftime("%Y-%m-%dT%H:%M:%SZ"),
