  external-beta:
    name: external-beta
    needs: protected-predecessor
    if: github.event_name == 'workflow_dispatch' && inputs.release_gate == 'external-beta' && inputs.confirm_protected_gate
    runs-on: ubuntu-24.04
    environment: production
