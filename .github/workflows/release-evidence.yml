  m6-exit:
    name: m6-exit
    needs: protected-predecessor
    if: github.event_name == 'workflow_dispatch' && inputs.release_gate == 'm6-exit' && inputs.confirm_protected_gate
    runs-on: ubuntu-24.04
    environment: production
    env:
      RELEASE_PROTECTED_ENVIRONMENT: production
      RELEASE_APPROVALS_TOKEN: ${{ secrets.RELEASE_APPROVALS_TOKEN }}
      RELEASE_PRODUCT_TEAM_ID: ${{ vars.RELEASE_PRODUCT_TEAM_ID }}
      RELEASE_PRODUCT_TEAM_SLUG: ${{ vars.RELEASE_PRODUCT_TEAM_SLUG }}
      RELEASE_SECURITY_TEAM_ID: ${{ vars.RELEASE_SECURITY_TEAM_ID }}
      RELEASE_SECURITY_TEAM_SLUG: ${{ vars.RELEASE_SECURITY_TEAM_SLUG }}
      RELEASE_OPS_TEAM_ID: ${{ vars.RELEASE_OPS_TEAM_ID }}
      RELEASE_OPS_TEAM_SLUG: ${{ vars.RELEASE_OPS_TEAM_SLUG }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 0
          persist-credentials: false
      - *restore_protected_predecessor
      - name: Collect M6-EXIT three-role approval
        shell: bash
        run: |
          set -euo pipefail
          input_hashes="$(python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          paths = {
              "perfSHA256": "Evidence/tests/PERF-001.json",
              "ops003SHA256": "Evidence/runtime/OPS-003.json",
              "ops004SHA256": "Evidence/runtime/OPS-004.json",
              "betaSHA256": "Evidence/runtime/REL-005.json",
              "thresholdSHA256": "Evidence/runtime/OPS-005.json",
              "authSHA256": "Evidence/runtime/AUTH-005-RC.json",
          }
          print(json.dumps({key: hashlib.sha256(Path(path).read_bytes()).hexdigest() for key, path in paths.items()}, sort_keys=True, separators=(",", ":")))
          PY
          )"
          beta_sha="$(python3 - <<'PY'
          import hashlib
          from pathlib import Path
          print(hashlib.sha256(Path("Evidence/runtime/REL-005.json").read_bytes()).hexdigest())
          PY
          )"
          Scripts/release/collect-role-approvals.sh \
            --gate m6-exit \
            --issue-url "${{ vars.HIKER_RELEASE_APPROVAL_ISSUE_URL }}" \
            --tag "$GITHUB_REF_NAME" \
            --commit "$GITHUB_SHA" \
            --manifest-sha "$HIKER_RELEASE_RC_MANIFEST_SHA" \
            --transition m6-exit \
            --metric-sha "$beta_sha" \
            --output Evidence/runtime/approvals/m6-exit.json \
            --input-hashes-json "$input_hashes"
      - run: Scripts/ci/run-evidence-profile.sh --profiles Docs/evidence/evidence-profiles.yml --id M6-EXIT
      - &validate_m6_admission
        name: Invoke validate-release-lineage.py for immutable M6-EXIT admission
        shell: bash
        env:
          HIKER_RELEASE_REQUIRED_M6_EXIT_SHA256: ${{ inputs.m6_exit_sha256 }}
          RELEASE_LINEAGE_GATE: ${{ inputs.release_gate }}
        run: |
          set -euo pipefail
          python3 - "Scripts/release/validate-release-lineage.py" <<'PY'
          import hashlib
          import importlib.util
          import os
          import re
          import sys
          from pathlib import Path

          expected = os.environ.get("HIKER_RELEASE_REQUIRED_M6_EXIT_SHA256", "")
          gate = os.environ.get("RELEASE_LINEAGE_GATE", "")
          if expected:
              if not re.fullmatch(r"[a-f0-9]{64}", expected):
                  raise SystemExit("required M6-EXIT SHA-256 is invalid")
          elif gate != "m6-exit":
              raise SystemExit("every M7 action requires the exact M6-EXIT SHA-256")
          script = Path(sys.argv[1]).resolve()
          spec = importlib.util.spec_from_file_location("protected_release_lineage", script)
          if spec is None or spec.loader is None:
              raise SystemExit("validate-release-lineage.py is unavailable")
          validator = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(validator)
          root = validator.repository_root()
          _record, digest = validator.verify_m6_exit(root, "Evidence/runtime/M6-EXIT.json")
          if expected and digest != expected:
              raise SystemExit("M6-EXIT digest does not match the protected admission input")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: "m6-exit-${{ github.sha }}"
          path: "Evidence/runtime/M6-EXIT.json*"
          if-no-files-found: error
          retention-days: 90
      - *stage_release_lineage
      - *upload_release_lineage
