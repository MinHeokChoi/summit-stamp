                  with os.fdopen(descriptor, "wb") as output:
                      output.write(content)
                      output.flush()
                      os.fsync(output.fileno())

          with zipfile.ZipFile("Evidence/runtime/live/M2A-release.ipa") as ipa:
              info = plistlib.loads(ipa.read("Payload/HikerApp.app/Info.plist"))
          version = info.get("CFBundleVersion")
          if not isinstance(version, str) or not version.isdigit():
              raise SystemExit("Release IPA has no numeric build version")
          query = {"filter[app]": os.environ["M2A_ASC_APP_ID"], "filter[version]": version, "limit": "1"}
          endpoint = "https://api.appstoreconnect.apple.com/v1/builds"
          request_url = endpoint + "?" + urllib.parse.urlencode(query)
          selected = None
