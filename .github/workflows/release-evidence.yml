              "internal-alpha": ("internal-alpha-observation", "release-observation.json", "release-observation.sig"),
              "metadata-review": ("metadata-review-observation", "release-observation.json", "release-observation.sig"),
              "migration-predeploy": ("migration-predeploy-observation", "release-observation.json", "release-observation.sig"),
              "compat-synthetics": ("compat-synthetics-observation", "release-observation.json", "release-observation.sig"),
              "pitr-drill": ("pitr-observation", "release-observation.json", "release-observation.sig"),
              "postrelease-review": ("postrelease-review-observation", "release-observation.json", "release-observation.sig"),
              "rc-auth-archive": ("rc-auth-archive-observation", "release-observation.json", "release-observation.sig"),
              "rc-auth-server": ("rc-auth-server-observation", "release-observation.json", "release-observation.sig"),
              "rollback-tabletop": ("rollback-tabletop-observation", "release-observation.json", "release-observation.sig"),
              "rollout-1pct": ("rollout-1pct-observation", "release-observation.json", "release-observation.sig"),
              "rollout-phase-05": ("rollout-phase-05-observation", "release-observation.json", "release-observation.sig"),
              "rollout-phase-25": ("rollout-phase-25-observation", "release-observation.json", "release-observation.sig"),
              "rollout-phase-50": ("rollout-phase-50-observation", "release-observation.json", "release-observation.sig"),
              "rollout-phase-100": ("rollout-phase-100-observation", "release-observation.json", "release-observation.sig"),
              "threshold-ratification": ("threshold-ratification-source", "threshold-ratification.json", "threshold-ratification.sig"),
          }
          repository = os.environ.get("GITHUB_REPOSITORY", "")
          token = os.environ.get("GITHUB_TOKEN", "")
          gate = os.environ.get("RELEASE_GATE", "")
          commit = os.environ.get("GITHUB_SHA", "")
          tag = os.environ.get("GITHUB_REF_NAME", "")
          consumer_run_id = os.environ.get("GITHUB_RUN_ID", "")
          if (
              gate not in expected_sources
              or not token
              or not re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", repository)
              or not re.fullmatch(r"v(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?", tag)
              or os.environ.get("GITHUB_REF_TYPE") != "tag"
              or os.environ.get("GITHUB_REF") != f"refs/tags/{tag}"
              or not re.fullmatch(r"[a-f0-9]{40}(?:[a-f0-9]{24})?", commit)
              or not re.fullmatch(r"[1-9][0-9]{0,19}", consumer_run_id)
          ):
              fail("protected source context is invalid")
          try:
              sources = json.loads(os.environ.get("RELEASE_PROTECTED_SOURCE_ARTIFACTS", "").encode("utf-8", "strict").decode("utf-8", "strict"), object_pairs_hook=reject_duplicates)
          except (UnicodeDecodeError, json.JSONDecodeError):
              fail("protected source input is invalid")
          if not isinstance(sources, list) or len(sources) != 1:
              fail("protected source input set is incomplete")
          source = sources[0]
          if not isinstance(source, dict) or set(source) != {"runId", "artifactName", "artifactDigest", "documentSHA256", "signatureSHA256"}:
              fail("protected source input is malformed")
          base_name, document_name, signature_name = expected_sources[gate]
          expected_name = f"{base_name}-{commit}"
          producer_run_id = source.get("runId")
          artifact_digest = source.get("artifactDigest")
          document_digest = source.get("documentSHA256")
          signature_digest = source.get("signatureSHA256")
          if (
              not isinstance(producer_run_id, str)
              or not re.fullmatch(r"[1-9][0-9]{0,19}", producer_run_id)
              or producer_run_id == consumer_run_id
              or source.get("artifactName") != expected_name
              or not isinstance(artifact_digest, str)
              or not re.fullmatch(r"sha256:[a-f0-9]{64}", artifact_digest)
              or not isinstance(document_digest, str)
              or not re.fullmatch(r"[a-f0-9]{64}", document_digest)
              or not isinstance(signature_digest, str)
              or not re.fullmatch(r"[a-f0-9]{64}", signature_digest)
          ):
              fail("protected source input does not bind the selected gate")
          run_request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/actions/runs/{producer_run_id}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(run_request, timeout=30) as response:
                  producer_run = json.loads(
                      response.read(512 * 1024 + 1).decode("utf-8", "strict"),
                      object_pairs_hook=reject_duplicates,
                  )
          except (OSError, urllib.error.HTTPError, UnicodeDecodeError, json.JSONDecodeError):
              fail("protected source producer run lookup failed")
          if (
              not isinstance(producer_run, dict)
              or producer_run.get("event") != "workflow_dispatch"
              or producer_run.get("head_sha") != commit
              or producer_run.get("head_branch") != os.environ.get("GITHUB_REF_NAME")
              or producer_run.get("name") != "Release Evidence"
              or not isinstance(producer_run.get("path"), str)
              or not producer_run["path"].startswith(".github/workflows/release-evidence.yml@")
              or producer_run.get("status") != "completed"
              or producer_run.get("conclusion") != "success"
          ):
              fail("protected source producer run is cross-lineage or incomplete")
          jobs_request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/actions/runs/{producer_run_id}/jobs?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(jobs_request, timeout=30) as response:
                  raw_jobs = response.read(2 * 1024 * 1024 + 1)
                  if response.status != 200 or len(raw_jobs) > 2 * 1024 * 1024:
                      fail("protected source producer job lookup failed")
                  jobs = json.loads(raw_jobs.decode("utf-8", "strict"), object_pairs_hook=reject_duplicates)
          except (OSError, urllib.error.HTTPError, UnicodeDecodeError, json.JSONDecodeError):
              fail("protected source producer job lookup failed")
          matching_jobs = [
              job for job in jobs.get("jobs", [])
              if isinstance(job, dict)
              and job.get("name") == "publish-protected-source"
              and job.get("status") == "completed"
              and job.get("conclusion") == "success"
          ] if isinstance(jobs, dict) else []
          if len(matching_jobs) != 1 or type(matching_jobs[0].get("id")) is not int or matching_jobs[0]["id"] <= 0:
              fail("protected source producer job is missing or incomplete")
          producer_job_id = matching_jobs[0]["id"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/actions/runs/{producer_run_id}/artifacts?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  raw = response.read(2 * 1024 * 1024 + 1)
                  artifacts = json.loads(raw.decode("utf-8", "strict"), object_pairs_hook=reject_duplicates)
          except (OSError, urllib.error.HTTPError, UnicodeDecodeError, json.JSONDecodeError):
              fail("protected source artifact lookup failed")
          candidates = [
              artifact for artifact in artifacts.get("artifacts", [])
              if isinstance(artifact, dict) and artifact.get("name") == expected_name
          ] if isinstance(artifacts, dict) else []
          if len(candidates) != 1:
              fail("protected source artifact is missing or ambiguous")
          artifact = candidates[0]
          archive_url = artifact.get("archive_download_url")
          if (
              artifact.get("expired") is not False
              or artifact.get("digest") != artifact_digest
              or not isinstance(archive_url, str)
              or not archive_url.startswith(f"https://api.github.com/repos/{repository}/actions/artifacts/")
              or not archive_url.endswith("/zip")
          ):
              fail("protected source artifact digest attestation is invalid")
          download_request = urllib.request.Request(
              archive_url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(download_request, timeout=30) as response:
                  archive_bytes = response.read(16 * 1024 * 1024 + 1)
              if not archive_bytes or len(archive_bytes) > 16 * 1024 * 1024:
                  fail("protected source archive is empty or too large")
              with zipfile.ZipFile(io.BytesIO(archive_bytes)) as archive:
                  members = archive.infolist()
                  expected_members = {document_name, signature_name}
                  if gate == "threshold-ratification":
                      expected_members.update({"threshold-approval.json", "threshold-approval.json.sha256"})
                  if {member.filename for member in members} != expected_members:
                      fail("protected source archive contents are not exact")
                  for member in members:
                      if member.is_dir() or member.file_size <= 0 or member.file_size > 1024 * 1024:
                          fail("protected source archive member is unsafe")
                      mode = member.external_attr >> 16
                      if stat.S_ISLNK(mode) or "/" in member.filename or "\\" in member.filename:
                          fail("protected source archive member is unsafe")
                      destination = Path(os.environ["RUNNER_TEMP"], member.filename)
                      descriptor = os.open(destination, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
                      with os.fdopen(descriptor, "wb") as output:
                          output.write(archive.read(member))
          except (OSError, urllib.error.HTTPError, zipfile.BadZipFile):
              fail("protected source artifact download failed")
          for name, expected_digest in ((document_name, document_digest), (signature_name, signature_digest)):
              path = Path(os.environ["RUNNER_TEMP"], name)
              try:
                  metadata = path.lstat()
              except OSError:
                  fail("protected source artifact file is missing")
              if stat.S_ISLNK(metadata.st_mode) or not stat.S_ISREG(metadata.st_mode) or metadata.st_size <= 0:
                  fail("protected source artifact file is unsafe")
              if hashlib.sha256(path.read_bytes()).hexdigest() != expected_digest:
                  fail("protected source file digest attestation is invalid")
          try:
              public_key_environment = (
                  "THRESHOLD_SOURCE_PUBLIC_KEY_BASE64"
                  if gate == "threshold-ratification"
                  else "OBSERVATION_SOURCE_PUBLIC_KEY_BASE64"
              )
              public_key = base64.b64decode(os.environ.get(public_key_environment, ""), validate=True)
          except ValueError:
              fail("protected source public key is invalid")
          if len(public_key) < 64 or b"BEGIN PUBLIC KEY" not in public_key:
              fail("protected source public key is invalid")
          try:
              with tempfile.TemporaryDirectory(prefix="release-source-verify-") as directory:
                  key_path = Path(directory, "source-public.pem")
                  key_path.write_bytes(public_key)
                  result = subprocess.run(
                      [
                          "openssl", "pkeyutl", "-verify", "-pubin", "-inkey", str(key_path),
                          "-rawin", "-in", str(Path(os.environ["RUNNER_TEMP"], document_name)),
                          "-sigfile", str(Path(os.environ["RUNNER_TEMP"], signature_name)),
                      ],
                      check=False,
                      stdin=subprocess.DEVNULL,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      timeout=30,
                  )
          except (OSError, subprocess.TimeoutExpired):
              fail("protected source signature verification failed")
          if result.returncode != 0:
              fail("protected source signature verification failed")
          if gate == "threshold-ratification":
              approval_destination = Path("Evidence/runtime/approvals/threshold.json")
              approval_destination.parent.mkdir(parents=True, exist_ok=True)
              approval_source = Path(os.environ["RUNNER_TEMP"], "threshold-approval.json")
              approval_sidecar_source = Path(os.environ["RUNNER_TEMP"], "threshold-approval.json.sha256")
              approval_payload = approval_source.read_bytes()
              approval_digest = hashlib.sha256(approval_payload).hexdigest()
              if approval_sidecar_source.read_bytes() != f"{approval_digest}  {approval_destination.as_posix()}\n".encode("ascii"):
                  fail("threshold approval source is invalid")
              for destination, payload in (
                  (approval_destination, approval_payload),
                  (Path(f"{approval_destination}.sha256"), approval_sidecar_source.read_bytes()),
              ):
                  descriptor = os.open(destination, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
                  with os.fdopen(descriptor, "wb") as output:
                      output.write(payload)
                      output.flush()
                      os.fsync(output.fileno())
          receipt = {
              "schemaVersion": 1,
              "artifactType": "protected-release-source-receipt",
              "targetGate": gate,
              "repository": repository,
              "tag": tag,
              "commit": commit,
              "consumerRunId": consumer_run_id,
              "producerRunId": producer_run_id,
              "producerJob": "publish-protected-source",
              "producerJobId": producer_job_id,
              "artifactLabel": expected_name,
              "artifactDigest": artifact_digest,
              "documentFile": document_name,
              "documentSHA256": document_digest,
              "signatureFile": signature_name,
              "signatureSHA256": signature_digest,
          }
          receipt_path = Path(os.environ["RUNNER_TEMP"], "release-protected-source-receipt.json")
          receipt_data = json.dumps(receipt, sort_keys=True, separators=(",", ":"), ensure_ascii=True).encode("ascii") + b"\n"
          descriptor = os.open(receipt_path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(descriptor, "wb") as output:
              output.write(receipt_data)
              output.flush()
              os.fsync(output.fileno())
          floor_destinations = {
              "external-beta": "Evidence/manifests/floor-beta.json",
              "rollout-review-05": "Evidence/manifests/floor-phase-05.json",
              "rollout-review-25": "Evidence/manifests/floor-phase-25.json",
              "rollout-review-50": "Evidence/manifests/floor-phase-50.json",
              "rollout-review-100": "Evidence/manifests/floor-phase-100.json",
          }
          if gate in floor_destinations:
              destination = Path(floor_destinations[gate])
              destination.parent.mkdir(parents=True, exist_ok=True)
              if destination.exists() or Path(f"{destination}.sha256").exists():
                  fail("runtime floor source destination already exists")
              payload = Path(os.environ["RUNNER_TEMP"], document_name).read_bytes()
              descriptor = os.open(destination, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
              with os.fdopen(descriptor, "wb") as output:
                  output.write(payload)
                  output.flush()
                  os.fsync(output.fileno())
              digest = hashlib.sha256(payload).hexdigest()
              sidecar_path = Path(f"{destination}.sha256")
              descriptor = os.open(sidecar_path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
              with os.fdopen(descriptor, "wb") as output:
                  output.write(f"{digest}  {destination.as_posix()}\n".encode("ascii"))
                  output.flush()
                  os.fsync(output.fileno())
          PY
      - run: Scripts/ci/run-evidence-profile.sh --profiles Docs/evidence/evidence-profiles.yml --id REL-004
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: "internal-alpha-${{ github.sha }}"
          path: "Evidence/runtime/REL-004.json*"
          if-no-files-found: error
          retention-days: 90
      - *stage_release_lineage
      - *upload_release_lineage
  migration-predeploy:
    name: migration-predeploy
    needs: protected-predecessor
    if: github.event_name == 'workflow_dispatch' && inputs.release_gate == 'migration-predeploy' && inputs.confirm_protected_gate
    runs-on: [self-hosted, linux, release-controller]
    environment: production
    env: &transition_predeploy
      RELEASE_PROTECTED_ENVIRONMENT: production
      HIKER_RELEASE_OBSERVED_INPUT_MANIFEST: Evidence/manifests/observed-predeploy.json
      HIKER_RELEASE_RPC_SHA256: ${{ vars.HIKER_RELEASE_RPC_SHA256 }}
      RELEASE_APPROVALS_TOKEN: ${{ secrets.RELEASE_APPROVALS_TOKEN }}
      RELEASE_PRODUCT_TEAM_ID: ${{ vars.RELEASE_PRODUCT_TEAM_ID }}
      RELEASE_PRODUCT_TEAM_SLUG: ${{ vars.RELEASE_PRODUCT_TEAM_SLUG }}
      RELEASE_SECURITY_TEAM_ID: ${{ vars.RELEASE_SECURITY_TEAM_ID }}
      RELEASE_SECURITY_TEAM_SLUG: ${{ vars.RELEASE_SECURITY_TEAM_SLUG }}
      RELEASE_OPS_TEAM_ID: ${{ vars.RELEASE_OPS_TEAM_ID }}
      RELEASE_OPS_TEAM_SLUG: ${{ vars.RELEASE_OPS_TEAM_SLUG }}
      HIKER_RELEASE_APPROVAL_ISSUE_URL: ${{ vars.HIKER_RELEASE_APPROVAL_ISSUE_URL }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 0
          persist-credentials: false
      - *restore_protected_predecessor
      - *verify_protected_source
      - name: Collect immutable three-role release approvals
        shell: bash
        run: |
          set -euo pipefail
          Scripts/release/collect-role-approvals.sh \
            --gate predeploy \
            --issue-url "$HIKER_RELEASE_APPROVAL_ISSUE_URL" \
            --tag "$GITHUB_REF_NAME" \
            --commit "$GITHUB_SHA" \
            --manifest-sha "$HIKER_RELEASE_OBSERVED_INPUT_SHA" \
            --transition predeploy-disabled \
            --metric-sha "$HIKER_RELEASE_PREVIOUS_EVENT_SHA" \
            --output Evidence/runtime/approvals/predeploy.json
      - &provision_release_rpc
        name: Provision SHA-attested protected release RPC helper
        shell: bash
        run: |
          set -euo pipefail
          python3 - "Scripts/release/hiker-release-rpc" "$RUNNER_TEMP/hiker-release-rpc" <<'PY'
          import hashlib
          import os
          import re
          import stat
          import sys
          from pathlib import Path

          source = Path(sys.argv[1])
          staged = Path(sys.argv[2])
          expected = os.environ.get("HIKER_RELEASE_RPC_SHA256", "")
          if not re.fullmatch(r"[a-f0-9]{64}", expected):
              raise SystemExit("protected release RPC helper digest is unavailable")
          try:
              metadata = source.lstat()
          except OSError as error:
              raise SystemExit("protected release RPC helper is unavailable") from error
          if stat.S_ISLNK(metadata.st_mode) or not stat.S_ISREG(metadata.st_mode):
              raise SystemExit("protected release RPC helper is unsafe")
          payload = source.read_bytes()
          if not payload or hashlib.sha256(payload).hexdigest() != expected:
              raise SystemExit("protected release RPC helper digest does not match")
          descriptor = os.open(staged, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o755)
          with os.fdopen(descriptor, "wb") as output:
              output.write(payload)
              output.flush()
              os.fsync(output.fileno())
          PY
          sudo install -o root -g root -m 755 "$RUNNER_TEMP/hiker-release-rpc" /usr/local/bin/hiker-release-rpc
          python3 - "/usr/local/bin/hiker-release-rpc" <<'PY'
          import hashlib
          import os
          import stat
          import sys
          from pathlib import Path

          target = Path(sys.argv[1])
          expected = os.environ["HIKER_RELEASE_RPC_SHA256"]
          metadata = target.lstat()
          if stat.S_ISLNK(metadata.st_mode) or not stat.S_ISREG(metadata.st_mode) or not (metadata.st_mode & stat.S_IXUSR):
              raise SystemExit("protected release RPC helper installation is unsafe")
          if hashlib.sha256(target.read_bytes()).hexdigest() != expected:
              raise SystemExit("protected release RPC helper installation digest does not match")
          PY
      - run: Scripts/ci/run-evidence-profile.sh --profiles Docs/evidence/evidence-profiles.yml --id REL-002
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: "migration-predeploy-${{ github.sha }}"
          path: "Evidence/runtime/REL-002.json*"
          if-no-files-found: error
          retention-days: 90
      - *stage_release_lineage
      - *upload_release_lineage

  compat-synthetics:
    name: compat-synthetics
    needs: protected-predecessor
    if: github.event_name == 'workflow_dispatch' && inputs.release_gate == 'compat-synthetics' && inputs.confirm_protected_gate
    runs-on: [self-hosted, linux, release-controller]
    environment: production
    env:
      <<: *transition_predeploy
      HIKER_RELEASE_OBSERVED_INPUT_MANIFEST: Evidence/manifests/observed-compatibility.json
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 0
          persist-credentials: false
      - *restore_protected_predecessor
      - *verify_protected_source
      - &collect_release_approvals
        name: Collect immutable three-role release approvals
        shell: bash
        run: |
          set -euo pipefail
          case "$GITHUB_JOB" in
            migration-predeploy) gate=predeploy; transition=predeploy-disabled ;;
            compat-synthetics) gate=compatibility; transition=compatibility ;;
            pitr-drill) gate=pitr-proof; transition=pitr-proof ;;
            rollout-1pct) gate=activate-1pct; transition=activate-1pct ;;
            rollout-phase-05) gate=phase-05; transition=phase-5 ;;
            rollout-phase-25) gate=phase-25; transition=phase-25 ;;
            rollout-phase-50) gate=phase-50; transition=phase-50 ;;
            rollout-phase-100) gate=phase-100; transition=phase-100 ;;
            contract-remove-old) gate=contract; transition=contract-remove-old ;;
            *) echo "unsupported release approval job" >&2; exit 1 ;;
          esac
          Scripts/release/collect-role-approvals.sh \
            --gate "$gate" \
            --issue-url "$HIKER_RELEASE_APPROVAL_ISSUE_URL" \
            --tag "$GITHUB_REF_NAME" \
            --commit "$GITHUB_SHA" \
            --manifest-sha "$HIKER_RELEASE_OBSERVED_INPUT_SHA" \
            --transition "$transition" \
            --metric-sha "$HIKER_RELEASE_PREVIOUS_EVENT_SHA" \
            --output "Evidence/runtime/approvals/$gate.json"
      - *provision_release_rpc
      - run: Scripts/ci/run-evidence-profile.sh --profiles Docs/evidence/evidence-profiles.yml --id REL-003
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: "compat-synthetics-${{ github.sha }}"
          path: "Evidence/runtime/REL-003.json*"
          if-no-files-found: error
          retention-days: 90
      - *stage_release_lineage
      - *upload_release_lineage

