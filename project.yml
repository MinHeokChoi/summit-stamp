name: Hiker

options:
  bundleIdPrefix: com.example.hiker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.5"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    EXTRACT_APP_INTENTS_METADATA: NO

packages:
  HikerDomain:
    path: Packages/HikerDomain
  HikerData:
    path: Packages/HikerData
  HikerDataset:
    path: Packages/HikerDataset
  HikerLocation:
    path: Packages/HikerLocation
  HikerObservability:
    path: Packages/HikerObservability

targets:
  HikerApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hiker
        INFOPLIST_FILE: Config/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: Config/HikerApp.entitlements
    dependencies:
      - target: HikerMapFeature
      - target: HikerPassportFeature
      - target: HikerSocialFeature
      - package: HikerDomain
        product: HikerDomain
      - package: HikerData
        product: HikerData
      - package: HikerDataset
        product: HikerDataset
      - package: HikerLocation
        product: HikerLocation
      - package: HikerObservability
        product: HikerObservability

  HikerMapFeature:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Features/Map
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hiker.feature.map
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: HikerDomain
        product: HikerDomain

  HikerFeaturesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/Features
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hiker.tests.features
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HikerMapFeature
      - target: HikerSocialFeature
      - package: HikerDomain
        product: HikerDomain
      - package: HikerDataset
        product: HikerDataset

  HikerPassportFeature:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Features/Passport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hiker.feature.passport
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: HikerDomain
        product: HikerDomain

  HikerSocialFeature:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Features/Social
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hiker.feature.social
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: HikerDomain
        product: HikerDomain

  HikerArchitectureTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/Architecture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hiker.tests.architecture
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HikerApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HikerApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: HikerApp

  HikerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/UI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hiker.tests.ui
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: HikerApp
    dependencies:
      - target: HikerApp

  HikerPerformanceTests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/Performance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hiker.tests.performance
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: HikerApp
    dependencies:
      - target: HikerApp

schemes:
  HikerApp:
    shared: true
    build:
      targets:
        HikerApp: all
    run:
      config: Debug

  HikerArchitectureTests:
    shared: true
    build:
      targets:
        HikerApp: [test]
        HikerArchitectureTests: [test]
    test:
      config: Debug
      targets:
        - HikerArchitectureTests

  HikerFeaturesTests:
    shared: true
    build:
      targets:
        HikerFeaturesTests: [test]
    test:
      config: Debug
      targets:
        - HikerFeaturesTests
  HikerUITests:
    shared: true
    build:
      targets:
        HikerApp: [test]
        HikerUITests: [test]
    test:
      config: Debug
      targets:
        - HikerUITests

  HikerPerformanceTests:
    shared: true
    build:
      targets:
        HikerApp: [test]
        HikerPerformanceTests: [test]
    test:
      config: Debug
      targets:
        - HikerPerformanceTests
